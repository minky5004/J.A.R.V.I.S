spring:
  application:
    name: jarvis
  datasource:
    url: jdbc:postgresql://localhost:5432/jarvis
    username: jarvis
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      model: gpt-4o-mini
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  cache:
    type: redis
    redis:
      time-to-live: 3600000

api:
  timeout:
    connect: 10000
    read: 30000

server:
  port: 8080