spring:
  application:
    name: jarvis
  datasource:
    url: jdbc:postgresql://localhost:5432/jarvis
    username: jarvis
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      model: gpt-4o-mini
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  cache:
    type: redis
    # TTL은 CacheConfig.java에서 캐시별로 설정됨

api:
  timeout:
    connect: 10000
    read: 30000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: list
    use-root-path: true

server:
  port: 8080