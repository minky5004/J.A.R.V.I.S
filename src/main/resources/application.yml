spring:
  application:
    name: jarvis
  datasource:
    url: jdbc:postgresql://localhost:5432/jarvis
    username: jarvis
    password: ${DB_PASSWORD:jarvis123}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      model: gpt-4o-mini
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

api:
  timeout:
    connect: 10000
    read: 30000

server:
  port: 8080