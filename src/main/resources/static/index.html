<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S - 음성 AI 어시스턴트</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23667eea'>🎤</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #f0f0f0;
        }

        body.dark-mode {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-primary: #1e1e1e;
            --bg-secondary: #2d2d2d;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
        }

        .container {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
            padding: 40px;
            transition: background 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-title {
            flex: 1;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.3s;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--bg-secondary);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            transition: border-color 0.3s;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .info-box {
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 20px;
            line-height: 1.5;
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
            transition: color 0.3s;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 2px dashed var(--primary);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            color: var(--primary);
            font-weight: 500;
        }

        .file-input-label:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--primary-dark);
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: none;
            transition: color 0.3s;
        }

        .file-name.show {
            display: block;
        }

        .file-name strong {
            color: var(--text-primary);
        }

        /* 음성 녹음 탭 */
        .recording-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .record-btn {
            flex: 1;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .record-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .record-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .record-btn.recording {
            background: #ff6b6b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #fff5f5;
            border-left: 4px solid #ff6b6b;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .recording-indicator.active {
            display: flex;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: recording-pulse 1s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .audio-preview {
            margin-bottom: 16px;
            display: none;
        }

        .audio-preview.show {
            display: block;
        }

        .audio-preview audio {
            width: 100%;
            margin-bottom: 8px;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 음성 파형 시각화 */
        .waveform-container {
            margin-bottom: 16px;
            display: none;
        }

        .waveform-container.show {
            display: block;
        }

        #waveformCanvas {
            width: 100%;
            height: 100px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .silence-timer {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        .silence-timer.detecting {
            color: #ff6b6b;
            font-weight: 600;
        }

        /* TTS 속도 조절 */
        .tts-controls {
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: none;
        }

        .tts-controls.show {
            display: block;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .speed-control label {
            margin: 0;
            min-width: 100px;
            font-size: 13px;
        }

        .speed-control input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .speed-value {
            min-width: 45px;
            text-align: right;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .result {
            margin-top: 30px;
            display: none;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .result.show {
            display: block;
        }

        .result.error {
            border-left-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        .result h3 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .result-item {
            margin-bottom: 12px;
            font-size: 13px;
        }

        .result-item label {
            display: inline;
            margin: 0;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .result-item.success {
            color: #27ae60;
        }

        .result-item.error {
            color: #ff6b6b;
        }

        .result-content {
            padding: 12px;
            background: var(--bg-primary);
            border-radius: 4px;
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            color: var(--text-primary);
            word-break: break-word;
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h1>🎤 J.A.R.V.I.S</h1>
                <p>음성 AI 어시스턴트</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="테마 토글">🌙</button>
        </div>

        <!-- 탭 메뉴 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'upload')">📁 파일 업로드</button>
            <button class="tab-btn" onclick="switchTab(event, 'record')">🎤 음성 녹음</button>
            <button class="tab-btn" onclick="switchTab(event, 'test')">🧪 테스트</button>
        </div>

        <!-- 탭 1: 파일 업로드 -->
        <div id="upload-tab" class="tab-content active">
            <div class="info-box">
                <strong>📝 사용법:</strong> 음성 파일을 선택하고 전송 버튼을 클릭하세요.
                <br>지원 형식: MP3, WAV, M4A, FLAC, OGG (최대 25MB)
            </div>

            <div class="form-group">
                <label for="fileInput">음성 파일 선택</label>
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept="audio/*" required>
                    <label for="fileInput" class="file-input-label">
                        📁 클릭하여 파일 선택
                    </label>
                </div>
                <div class="file-name" id="fileName"></div>
            </div>

            <button id="uploadBtn" onclick="uploadFile()">전송</button>
        </div>

        <!-- 탭 2: 음성 녹음 -->
        <div id="record-tab" class="tab-content">
            <div class="info-box">
                <strong>🎤 음성 녹음:</strong> 마이크에 말씀하세요. AI가 자동으로 인식하고 명령을 실행합니다.
            </div>

            <div class="recording-indicator" id="recordingIndicator">
                <div class="recording-dot"></div>
                <span>녹음 중...</span>
            </div>

            <div class="recording-controls">
                <button id="startRecordBtn" class="record-btn" onclick="startRecording()">
                    🎤 녹음 시작
                </button>
                <button id="stopRecordBtn" class="record-btn" onclick="stopRecording()" disabled>
                    ⏹️ 녹음 중지
                </button>
            </div>

            <div class="waveform-container" id="waveformContainer">
                <canvas id="waveformCanvas"></canvas>
                <div class="silence-timer" id="silenceTimer"></div>
            </div>

            <div class="audio-preview" id="audioPreview">
                <label>녹음된 음성 미리듣기:</label>
                <audio id="audioPlayback" controls></audio>
            </div>

            <button id="submitRecordBtn" onclick="submitRecording()" style="display: none;">
                전송
            </button>
        </div>

        <!-- 탭 3: 테스트 -->
        <div id="test-tab" class="tab-content">
            <div class="info-box">
                <strong>🧪 TTS 음성 변환 테스트:</strong> 텍스트를 입력하고 전송하면 AI가 응답을 음성으로 변환합니다.
            </div>

            <div class="form-group">
                <label for="testInput">테스트 텍스트 입력</label>
                <textarea id="testInput" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 100px;" placeholder="예: 날씨 어때?"></textarea>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="testPresetBtn" onclick="setTestPreset()" style="flex: 1; background: #764ba2;">
                    📋 샘플 입력
                </button>
                <button id="testSendBtn" onclick="submitTest()" style="flex: 1;">
                    🚀 전송
                </button>
            </div>
        </div>

        <!-- 로딩 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: var(--text-secondary); font-size: 13px;">처리 중...</p>
        </div>

        <!-- TTS 속도 조절 -->
        <div class="tts-controls" id="ttsControls">
            <div class="speed-control">
                <label>재생 속도:</label>
                <input type="range" id="speedSlider" min="0.5" max="2" step="0.25" value="1" onchange="updatePlaybackSpeed(this.value)">
                <span class="speed-value" id="speedValue">1.0x</span>
            </div>
        </div>

        <!-- 결과 -->
        <div class="result" id="result">
            <h3 id="resultTitle">결과</h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/voice/process';
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let selectedMimeType = 'audio/webm';
        let audioContext;
        let analyser;
        let animationId;
        let silenceStart = null;
        const SILENCE_THRESHOLD = 30;
        const SILENCE_DURATION = 2000;
        let currentAudioElement = null;

        // 다크모드 토글
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const themeBtn = document.querySelector('.theme-toggle');
            themeBtn.textContent = isDark ? '☀️' : '🌙';
        }

        // 초기화: 저장된 테마 불러오기
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (savedTheme === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark-mode');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        }

        // TTS 재생 속도 업데이트
        function updatePlaybackSpeed(speed) {
            document.getElementById('speedValue').textContent = speed + 'x';
            if (currentAudioElement) {
                currentAudioElement.playbackRate = parseFloat(speed);
            }
        }

        // 파형 그리기
        function drawWaveform() {
            const canvas = document.getElementById('waveformCanvas');
            if (!canvas || !analyser) return;

            const canvasCtx = canvas.getContext('2d');
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            canvasCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg-secondary');
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const bars = 100;
            const barWidth = canvas.width / bars;
            let maxValue = 0;

            for (let i = 0; i < bars; i++) {
                const dataIndex = Math.floor(i * (bufferLength / bars));
                const value = dataArray[dataIndex];
                maxValue = Math.max(maxValue, value);
            }

            canvasCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
            for (let i = 0; i < bars; i++) {
                const dataIndex = Math.floor(i * (bufferLength / bars));
                const value = dataArray[dataIndex];
                const height = (value / 255) * canvas.height;
                const y = canvas.height - height;

                canvasCtx.fillRect(i * barWidth + 1, y, barWidth - 2, height);
            }

            // 침묵 감지
            if (isRecording) {
                checkSilence(maxValue);
            }

            animationId = requestAnimationFrame(drawWaveform);
        }

        // 침묵 감지
        function checkSilence(value) {
            const isSilent = value < SILENCE_THRESHOLD;

            if (isSilent) {
                if (!silenceStart) {
                    silenceStart = Date.now();
                }

                const silenceDuration = Date.now() - silenceStart;
                const remainingTime = Math.max(0, Math.ceil((SILENCE_DURATION - silenceDuration) / 1000));

                if (remainingTime > 0) {
                    document.getElementById('silenceTimer').classList.add('detecting');
                    document.getElementById('silenceTimer').textContent = `침묵 감지됨: ${remainingTime}초 후 자동 전송`;
                }

                if (silenceDuration > SILENCE_DURATION) {
                    document.getElementById('silenceTimer').classList.remove('detecting');
                    stopRecordingAuto();
                }
            } else {
                silenceStart = null;
                document.getElementById('silenceTimer').classList.remove('detecting');
                document.getElementById('silenceTimer').textContent = '';
            }
        }

        // 자동 녹음 중지
        function stopRecordingAuto() {
            console.log('침묵 감지로 자동 중지됨');
            stopRecording();
        }

        // 탭 전환
        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // MediaRecorder 호환 MIME 타입 선택
        function getCompatibleMimeType() {
            const mimeTypes = [
                'audio/webm;codecs=opus',
                'audio/ogg;codecs=opus',
                'audio/webm',
                'audio/ogg',
                'audio/mp4'
            ];

            for (const mimeType of mimeTypes) {
                if (MediaRecorder.isTypeSupported(mimeType)) {
                    return mimeType;
                }
            }
            return 'audio/webm';
        }

        // 파일 확장자 가져오기
        function getMimeTypeExtension(mimeType) {
            const mimeTypeMap = {
                'audio/webm': 'webm',
                'audio/ogg': 'ogg',
                'audio/mp4': 'm4a',
                'audio/mpeg': 'mp3'
            };
            return mimeTypeMap[mimeType.split(';')[0]] || 'webm';
        }

        // ========== 파일 업로드 방식 ==========
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadBtn = document.getElementById('uploadBtn');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                fileNameDisplay.innerHTML = `<strong>선택된 파일:</strong> ${file.name} (${sizeMB}MB)`;
                fileNameDisplay.classList.add('show');
            }
        });

        function uploadFile() {
            const file = fileInput.files[0];
            if (!file) {
                showError('파일을 선택해주세요.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show', 'error');

            fetch(API_BASE, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                const isOk = response.ok;
                return response.json().then(data => ({isOk, data}));
            })
            .then(({isOk, data}) => {
                uploadBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';

                if (isOk) {
                    showSuccess(data);
                } else {
                    showError(data.message || '알 수 없는 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                uploadBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';
                showError(`네트워크 오류: ${error.message}`);
            });
        }

        // ========== 음성 녹음 방식 ==========
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                selectedMimeType = getCompatibleMimeType();
                const options = { mimeType: selectedMimeType };
                mediaRecorder = new MediaRecorder(stream, options);
                recordedChunks = [];

                // AudioContext 초기화 (파형 시각화용)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);

                // 파형 시각화 시작
                document.getElementById('waveformContainer').classList.add('show');
                silenceStart = null;
                drawWaveform();

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstart = () => {
                    isRecording = true;
                    document.getElementById('startRecordBtn').classList.add('recording');
                    document.getElementById('startRecordBtn').disabled = true;
                    document.getElementById('stopRecordBtn').disabled = false;
                    document.getElementById('recordingIndicator').classList.add('active');
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(recordedChunks, { type: selectedMimeType });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    document.getElementById('audioPlayback').src = audioUrl;
                    document.getElementById('audioPreview').classList.add('show');
                    document.getElementById('submitRecordBtn').style.display = 'block';

                    document.getElementById('startRecordBtn').classList.remove('recording');
                    document.getElementById('startRecordBtn').disabled = false;
                    document.getElementById('stopRecordBtn').disabled = true;
                    document.getElementById('recordingIndicator').classList.remove('active');

                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
            } catch (error) {
                showError(`마이크 접근 오류: ${error.message}`);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                isRecording = false;

                // 파형 시각화 중지
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                document.getElementById('waveformContainer').classList.remove('show');
                document.getElementById('silenceTimer').classList.remove('detecting');
                document.getElementById('silenceTimer').textContent = '';

                // AudioContext 종료
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                    analyser = null;
                }
            }
        }

        function submitRecording() {
            if (recordedChunks.length === 0) {
                showError('먼저 음성을 녹음해주세요.');
                return;
            }

            const audioBlob = new Blob(recordedChunks, { type: selectedMimeType });
            const fileExtension = getMimeTypeExtension(selectedMimeType);
            const formData = new FormData();
            formData.append('file', audioBlob, `recording.${fileExtension}`);

            document.getElementById('submitRecordBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show', 'error');

            fetch(API_BASE, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                const isOk = response.ok;
                return response.json().then(data => ({isOk, data}));
            })
            .then(({isOk, data}) => {
                document.getElementById('submitRecordBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';

                if (isOk) {
                    showSuccess(data);
                } else {
                    showError(data.message || '알 수 없는 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                document.getElementById('submitRecordBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
                showError(`네트워크 오류: ${error.message}`);
            });
        }

        // ========== 결과 표시 ==========
        function showSuccess(data) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            resultTitle.textContent = '✅ 처리 성공';

            const aiResponseText = data.data.resultText || '';
            const audioData = data.data.result || '';
            const isAudioData = audioData && audioData.startsWith('data:audio/');

            let responseHtml = '';

            // 텍스트 응답 표시
            if (aiResponseText) {
                responseHtml += `
                    <div class="result-item">
                        <label>AI 응답 (텍스트):</label>
                        <div class="result-content">${escapeHtml(aiResponseText)}</div>
                    </div>
                `;
            }

            // 음성 응답 표시 및 TTS 속도 조절
            if (isAudioData) {
                responseHtml += `
                    <div class="result-item">
                        <label>AI 응답 (음성):</label>
                        <div class="result-content">
                            <audio id="resultAudio" controls autoplay style="width: 100%; margin: 8px 0;">
                                <source src="${audioData}" type="audio/mp3">
                                브라우저가 음성 재생을 지원하지 않습니다.
                            </audio>
                        </div>
                    </div>
                `;

                // TTS 컨트롤 표시
                document.getElementById('ttsControls').classList.add('show');

                // 결과 표시 후 audio 요소 설정
                setTimeout(() => {
                    const audioElement = document.getElementById('resultAudio');
                    if (audioElement) {
                        currentAudioElement = audioElement;
                        audioElement.playbackRate = parseFloat(document.getElementById('speedSlider').value);
                    }
                }, 100);
            } else {
                document.getElementById('ttsControls').classList.remove('show');
                currentAudioElement = null;
            }

            resultContent.innerHTML = `
                <div class="result-item success">
                    <label>상태:</label> 성공
                </div>
                <div class="result-item">
                    <label>처리 ID:</label>
                    <div class="result-content">${data.data.id}</div>
                </div>
                <div class="result-item">
                    <label>음성 인식:</label>
                    <div class="result-content">${escapeHtml(data.data.transcript)}</div>
                </div>
                <div class="result-item">
                    <label>의도:</label>
                    <div class="result-content">${escapeHtml(data.data.intent)}</div>
                </div>
                ${responseHtml}
            `;
            result.classList.add('show');
        }

        function showError(message) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            resultTitle.textContent = '❌ 오류 발생';
            resultContent.innerHTML = `
                <div class="result-item error">
                    <label>에러 메시지:</label>
                    <div class="result-content">${escapeHtml(message)}</div>
                </div>
            `;
            result.classList.add('show', 'error');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ========== 테스트 탭 ==========
        function setTestPreset() {
            const presets = [
                "안녕하세요, J.A.R.V.I.S입니다.",
                "오늘 날씨는 맑습니다.",
                "현재 시간은 오후 3시입니다.",
                "비트코인 시세를 검색해주세요."
            ];
            const randomPreset = presets[Math.floor(Math.random() * presets.length)];
            document.getElementById('testInput').value = randomPreset;
        }

        function submitTest() {
            const text = document.getElementById('testInput').value.trim();
            if (!text) {
                showError('테스트 텍스트를 입력해주세요.');
                return;
            }

            const testData = {
                transcript: text,
                intent: text.length > 50 ? text.substring(0, 50) + "..." : text,
                data: {
                    id: 'test-' + Date.now(),
                    transcript: text,
                    intent: text.length > 50 ? text.substring(0, 50) + "..." : text,
                    result: "다 처리 중입니다. AI 응답이 음성으로 변환 중입니다..."
                }
            };

            document.getElementById('testSendBtn').disabled = true;
            document.getElementById('testPresetBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show', 'error');

            // 백엔드에 텍스트 전송
            fetch('/api/voice/test', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: text })
            })
            .then(response => {
                const isOk = response.ok;
                return response.json().then(data => ({isOk, data}));
            })
            .then(({isOk, data}) => {
                document.getElementById('testSendBtn').disabled = false;
                document.getElementById('testPresetBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';

                if (isOk) {
                    showSuccess(data);
                } else {
                    showError(data.message || '알 수 없는 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                document.getElementById('testSendBtn').disabled = false;
                document.getElementById('testPresetBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
                showError(`네트워크 오류: ${error.message}`);
            });
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', initTheme);
    </script>
</body>
</html>
