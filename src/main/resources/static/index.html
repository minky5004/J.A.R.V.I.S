<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S - 음성 AI 어시스턴트</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23667eea'>🎤</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px 16px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            color: #667eea;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        .file-name strong {
            color: #333;
        }

        /* 음성 녹음 탭 */
        .recording-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .record-btn {
            flex: 1;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .record-btn:hover:not(:disabled) {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .record-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .record-btn.recording {
            background: #ff6b6b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #fff5f5;
            border-left: 4px solid #ff6b6b;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .recording-indicator.active {
            display: flex;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: recording-pulse 1s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .audio-preview {
            margin-bottom: 16px;
            display: none;
        }

        .audio-preview.show {
            display: block;
        }

        .audio-preview audio {
            width: 100%;
            margin-bottom: 8px;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            margin-top: 30px;
            display: none;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result.show {
            display: block;
        }

        .result.error {
            border-left-color: #ff6b6b;
            background: #fff5f5;
        }

        .result h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-item {
            margin-bottom: 12px;
            font-size: 13px;
        }

        .result-item label {
            display: inline;
            margin: 0;
            font-weight: 600;
            color: #666;
        }

        .result-item.success {
            color: #27ae60;
        }

        .result-item.error {
            color: #ff6b6b;
        }

        .result-content {
            padding: 12px;
            background: white;
            border-radius: 4px;
            margin-top: 8px;
            font-size: 13px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            color: #333;
            word-break: break-word;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 J.A.R.V.I.S</h1>
            <p>음성 AI 어시스턴트</p>
        </div>

        <!-- 탭 메뉴 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'upload')">📁 파일 업로드</button>
            <button class="tab-btn" onclick="switchTab(event, 'record')">🎤 음성 녹음</button>
        </div>

        <!-- 탭 1: 파일 업로드 -->
        <div id="upload-tab" class="tab-content active">
            <div class="info-box">
                <strong>📝 사용법:</strong> 음성 파일을 선택하고 전송 버튼을 클릭하세요.
                <br>지원 형식: MP3, WAV, M4A, FLAC, OGG (최대 25MB)
            </div>

            <div class="form-group">
                <label for="fileInput">음성 파일 선택</label>
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept="audio/*" required>
                    <label for="fileInput" class="file-input-label">
                        📁 클릭하여 파일 선택
                    </label>
                </div>
                <div class="file-name" id="fileName"></div>
            </div>

            <button id="uploadBtn" onclick="uploadFile()">전송</button>
        </div>

        <!-- 탭 2: 음성 녹음 -->
        <div id="record-tab" class="tab-content">
            <div class="info-box">
                <strong>🎤 음성 녹음:</strong> 마이크에 말씀하세요. AI가 자동으로 인식하고 명령을 실행합니다.
            </div>

            <div class="recording-indicator" id="recordingIndicator">
                <div class="recording-dot"></div>
                <span>녹음 중...</span>
            </div>

            <div class="recording-controls">
                <button id="startRecordBtn" class="record-btn" onclick="startRecording()">
                    🎤 녹음 시작
                </button>
                <button id="stopRecordBtn" class="record-btn" onclick="stopRecording()" disabled>
                    ⏹️ 녹음 중지
                </button>
            </div>

            <div class="audio-preview" id="audioPreview">
                <label>녹음된 음성 미리듣기:</label>
                <audio id="audioPlayback" controls></audio>
            </div>

            <button id="submitRecordBtn" onclick="submitRecording()" style="display: none;">
                전송
            </button>
        </div>

        <!-- 로딩 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; color: #666; font-size: 13px;">처리 중...</p>
        </div>

        <!-- 결과 -->
        <div class="result" id="result">
            <h3 id="resultTitle">결과</h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/voice/process';
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let selectedMimeType = 'audio/webm';

        // 탭 전환
        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // MediaRecorder 호환 MIME 타입 선택
        function getCompatibleMimeType() {
            const mimeTypes = [
                'audio/webm;codecs=opus',
                'audio/ogg;codecs=opus',
                'audio/webm',
                'audio/ogg',
                'audio/mp4'
            ];

            for (const mimeType of mimeTypes) {
                if (MediaRecorder.isTypeSupported(mimeType)) {
                    return mimeType;
                }
            }
            return 'audio/webm';
        }

        // 파일 확장자 가져오기
        function getMimeTypeExtension(mimeType) {
            const mimeTypeMap = {
                'audio/webm': 'webm',
                'audio/ogg': 'ogg',
                'audio/mp4': 'm4a',
                'audio/mpeg': 'mp3'
            };
            return mimeTypeMap[mimeType.split(';')[0]] || 'webm';
        }

        // ========== 파일 업로드 방식 ==========
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileName');
        const uploadBtn = document.getElementById('uploadBtn');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                fileNameDisplay.innerHTML = `<strong>선택된 파일:</strong> ${file.name} (${sizeMB}MB)`;
                fileNameDisplay.classList.add('show');
            }
        });

        function uploadFile() {
            const file = fileInput.files[0];
            if (!file) {
                showError('파일을 선택해주세요.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show', 'error');

            fetch(API_BASE, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                const isOk = response.ok;
                return response.json().then(data => ({isOk, data}));
            })
            .then(({isOk, data}) => {
                uploadBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';

                if (isOk) {
                    showSuccess(data);
                } else {
                    showError(data.message || '알 수 없는 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                uploadBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';
                showError(`네트워크 오류: ${error.message}`);
            });
        }

        // ========== 음성 녹음 방식 ==========
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                selectedMimeType = getCompatibleMimeType();
                const options = { mimeType: selectedMimeType };
                mediaRecorder = new MediaRecorder(stream, options);
                recordedChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstart = () => {
                    isRecording = true;
                    document.getElementById('startRecordBtn').classList.add('recording');
                    document.getElementById('startRecordBtn').disabled = true;
                    document.getElementById('stopRecordBtn').disabled = false;
                    document.getElementById('recordingIndicator').classList.add('active');
                };

                mediaRecorder.start();
            } catch (error) {
                showError(`마이크 접근 오류: ${error.message}`);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();

                mediaRecorder.onstop = () => {
                    isRecording = false;
                    const audioBlob = new Blob(recordedChunks, { type: selectedMimeType });
                    const audioUrl = URL.createObjectURL(audioBlob);

                    document.getElementById('audioPlayback').src = audioUrl;
                    document.getElementById('audioPreview').classList.add('show');
                    document.getElementById('submitRecordBtn').style.display = 'block';

                    document.getElementById('startRecordBtn').classList.remove('recording');
                    document.getElementById('startRecordBtn').disabled = false;
                    document.getElementById('stopRecordBtn').disabled = true;
                    document.getElementById('recordingIndicator').classList.remove('active');

                    // 스트림 중지
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                };
            }
        }

        function submitRecording() {
            if (recordedChunks.length === 0) {
                showError('먼저 음성을 녹음해주세요.');
                return;
            }

            const audioBlob = new Blob(recordedChunks, { type: selectedMimeType });
            const fileExtension = getMimeTypeExtension(selectedMimeType);
            const formData = new FormData();
            formData.append('file', audioBlob, `recording.${fileExtension}`);

            document.getElementById('submitRecordBtn').disabled = true;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').classList.remove('show', 'error');

            fetch(API_BASE, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                const isOk = response.ok;
                return response.json().then(data => ({isOk, data}));
            })
            .then(({isOk, data}) => {
                document.getElementById('submitRecordBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';

                if (isOk) {
                    showSuccess(data);
                } else {
                    showError(data.message || '알 수 없는 오류가 발생했습니다.');
                }
            })
            .catch(error => {
                document.getElementById('submitRecordBtn').disabled = false;
                document.getElementById('loading').style.display = 'none';
                showError(`네트워크 오류: ${error.message}`);
            });
        }

        // ========== 결과 표시 ==========
        function showSuccess(data) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            resultTitle.textContent = '✅ 처리 성공';
            resultContent.innerHTML = `
                <div class="result-item success">
                    <label>상태:</label> 성공
                </div>
                <div class="result-item">
                    <label>처리 ID:</label>
                    <div class="result-content">${data.data.id}</div>
                </div>
                <div class="result-item">
                    <label>음성 인식:</label>
                    <div class="result-content">${escapeHtml(data.data.transcript)}</div>
                </div>
                <div class="result-item">
                    <label>의도:</label>
                    <div class="result-content">${escapeHtml(data.data.intent)}</div>
                </div>
                <div class="result-item">
                    <label>AI 응답:</label>
                    <div class="result-content">${escapeHtml(data.data.result)}</div>
                </div>
            `;
            result.classList.add('show');
        }

        function showError(message) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            resultTitle.textContent = '❌ 오류 발생';
            resultContent.innerHTML = `
                <div class="result-item error">
                    <label>에러 메시지:</label>
                    <div class="result-content">${escapeHtml(message)}</div>
                </div>
            `;
            result.classList.add('show', 'error');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
